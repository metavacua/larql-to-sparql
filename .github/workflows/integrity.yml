# SPDX-License-Identifier: Apache-2.0

name: Integrity & Provenance Checks

on:
  pull_request:
    branches: [main, master]

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Ensure every file has a human-assigned license/copyright
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@v3

      # 2. Ensure human-written commits follow Conventional Commits standard
      - name: Lint Commit Messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json

      # 3. Verify CHANGELOG.md structure
      - name: Verify CHANGELOG Format
        run: |
          test -f CHANGELOG.md || { echo "CHANGELOG.md missing"; exit 1; }
          grep -q "\[Unreleased\]" CHANGELOG.md || { echo "[Unreleased] section missing"; exit 1; }
          echo "✓ CHANGELOG.md is properly formatted"
