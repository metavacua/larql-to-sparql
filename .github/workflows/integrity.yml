# SPDX-License-Identifier: Apache-2.0

name: Integrity & Provenance Checks

on:
  pull_request:
    branches: [main, master]

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Lint Commit Messages - Ensures structured history
      - name: Lint Commit Messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json

      # 2. Verify CHANGELOG.md structure - Ensures derived documentation
      - name: Verify CHANGELOG Format
        run: |
          test -f CHANGELOG.md || { echo "CHANGELOG.md missing"; exit 1; }
          grep -q "\[Unreleased\]" CHANGELOG.md || { echo "[Unreleased] section missing"; exit 1; }
          echo "✓ CHANGELOG.md is properly formatted"

      # 3. Verify toolchain configuration files exist
      - name: Verify Toolchain Configuration
        run: |
          echo "Checking governance toolchain configuration..."
          test -f .commitlintrc.json || { echo ".commitlintrc.json missing"; exit 1; }
          test -f .pre-commit-config.yaml || { echo ".pre-commit-config.yaml missing"; exit 1; }
          test -f scripts/changelog-transformer.py || { echo "changelog-transformer.py missing"; exit 1; }
          echo "✓ All governance toolchain files present"

      # 4. REUSE Compliance Check - Informational (separate repo-wide initiative)
      - name: REUSE Compliance Check (Informational)
        continue-on-error: true
        uses: fsfe/reuse-action@v3
