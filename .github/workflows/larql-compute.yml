# larql-compute Windows CI
#
# Validates the CPU baseline on Windows. The Metal feature is macOS-only
# and not applicable here. Linux/macOS runs are eliminated per project
# decision to consolidate on Windows.

name: larql-compute

permissions:
  contents: read

on:
  push:
    branches: [main, windows-ci-cd]
    paths:
      - 'crates/larql-compute/**'
      - 'crates/larql-models/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - '.github/workflows/larql-compute.yml'
  pull_request:
    branches: [main, windows-ci-cd]
    paths:
      - 'crates/larql-compute/**'
      - 'crates/larql-models/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - '.github/workflows/larql-compute.yml'
  workflow_dispatch: {}

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  test:
    name: test · windows
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cmake + zlib (Windows)
        shell: pwsh
        run: |
          choco install cmake zlib --installargs 'ADD_CMAKE_TO_PATH=System' -y
          refreshenv

      - name: Install OpenBLAS (Windows)
        shell: pwsh
        run: |
          $root = $env:VCPKG_INSTALLATION_ROOT
          if (-not $root) {
            $root = 'C:\vcpkg'
          }
          & "$root\vcpkg.exe" install openblas:x64-windows
          "VCPKG_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$root\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-compute-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-compute-

      - name: Format check
        run: cargo fmt -p larql-compute -- --check

      - name: Check default features
        run: cargo check -p larql-compute --all-targets

      - name: Check all features
        run: cargo check -p larql-compute --all-targets --all-features

      - name: Clippy default features
        run: cargo clippy -p larql-compute --all-targets -- -D warnings

      - name: Clippy all features
        run: cargo clippy -p larql-compute --all-targets --all-features -- -D warnings

      - name: Unit tests
        run: cargo test -p larql-compute --lib

      - name: Backend contract tests
        run: cargo test -p larql-compute --test test_backend_matmul_quant

      - name: Pipeline and MoE contract tests
        run: cargo test -p larql-compute --test test_pipeline_and_moe
