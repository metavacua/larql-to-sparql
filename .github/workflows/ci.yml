name: CI

on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Test Suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust/Cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      # ── Rust Quality Checks ──

      - name: Check code formatting (rustfmt)
        run: make fmt-check

      - name: Lint with Clippy
        run: make lint

      # ── Rust Tests ──

      - name: Run Rust tests (Linux, no Metal)
        if: runner.os == 'Linux'
        run: cargo test --lib --no-default-features

      - name: Run Rust tests (macOS, with Metal)
        if: runner.os == 'macOS'
        run: cargo test --lib --features metal

      # ── Python Extension ──

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Python dependencies
        run: |
          cd crates/larql-python
          uv sync --no-install-project --group dev

      - name: Build Python extension
        run: |
          cd crates/larql-python
          uv run --no-sync maturin develop --release

      - name: Test Python extension
        run: |
          cd crates/larql-python
          uv run --no-sync pytest tests/

      # ── Build Summary ──

      - name: Print Rust version info
        run: |
          rustc --version
          cargo --version

      - name: Print Python version info
        run: python --version

  success:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: ci
    if: success()
    steps:
      - name: Confirm CI success
        run: echo "✅ All checks passed"
