name: CI

on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-matrix:
    name: Test (${{ matrix.os }}, Rust ${{ matrix.rust }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux with stable Rust (OpenBLAS vendored by default)
          - os: ubuntu-latest
            rust: stable
            cargo_args: ""
          - os: ubuntu-latest
            rust: "1.80"  # MSRV
            cargo_args: ""

          # macOS Intel with stable (Accelerate)
          - os: macos-12
            rust: stable
            cargo_args: ""

          # macOS ARM (Apple Silicon) with stable and Metal GPU
          - os: macos-14
            rust: stable
            cargo_args: "--features metal"

          # Windows MSVC
          - os: windows-latest
            rust: stable
            cargo_args: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-target-

      - name: Run tests
        run: cargo test --workspace ${{ matrix.cargo_args }}

      - name: Run doc tests
        run: cargo test --doc ${{ matrix.cargo_args }}

  fmt-lint:
    name: Format & Lint (Rust ${{ matrix.rust }})
    strategy:
      matrix:
        rust: [stable]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt,clippy

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-fmt-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-fmt-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --tests --all-targets -- -D warnings

  python-test-matrix:
    name: Python Tests (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu with 3.11, 3.12, 3.13
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"

          # macOS with 3.11 (minimal coverage)
          - os: macos-latest
            python-version: "3.11"

          # Windows with 3.11 (minimal coverage)
          - os: windows-latest
            python-version: "3.11"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-python-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-python-

      - name: Install build dependencies
        run: pip install maturin pytest numpy

      - name: Build Python extension
        working-directory: crates/larql-python
        run: pip install -e .

      - name: Run Python tests
        working-directory: crates/larql-python
        run: pytest tests/ -v

  check-env:
    name: Environment Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate Rust version
        run: rustc --version && cargo --version

      - name: Check Python availability
        run: python3 --version

      - name: Verify Makefile targets exist
        run: |
          grep -q "^build:" Makefile && echo "✓ build target found"
          grep -q "^test:" Makefile && echo "✓ test target found"
          grep -q "^ci:" Makefile && echo "✓ ci target found"
