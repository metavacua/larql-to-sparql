# larql-lql Windows CI
#
# LQL parser, executor, and REPL. The crate is model/architecture
# agnostic — parser tests are pure, executor integration tests use
# `mockito` to fake the Remote backend, and the metal feature is opt-in
# (default = []). Linux/macOS runs are eliminated per project decision
# to consolidate on Windows.

name: larql-lql

on:
  push:
    branches: [main, windows-ci-cd]
    paths:
      - 'crates/larql-lql/**'
      - 'crates/larql-core/**'
      - 'crates/larql-vindex/**'
      - 'crates/larql-models/**'
      - 'crates/larql-inference/src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - '.github/workflows/larql-lql.yml'
  pull_request:
    branches: [main, windows-ci-cd]
    paths:
      - 'crates/larql-lql/**'
      - 'crates/larql-core/**'
      - 'crates/larql-vindex/**'
      - 'crates/larql-models/**'
      - 'crates/larql-inference/src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - '.github/workflows/larql-lql.yml'
  workflow_dispatch: {}

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  test:
    name: test · windows
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cmake + zlib (Windows)
        shell: pwsh
        run: |
          choco install cmake zlib --installargs 'ADD_CMAKE_TO_PATH=System' -y
          refreshenv

      - name: Install OpenBLAS (Windows)
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) { $vcpkgRoot = "C:\vcpkg" }
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & "$vcpkgRoot\vcpkg.exe" install openblas:x64-windows
          "$vcpkgRoot\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-lql-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-lql-

      - name: Format check
        run: cargo fmt -p larql-lql -- --check

      - name: Check all targets
        run: cargo check -p larql-lql --all-targets

      - name: Clippy
        # `--no-deps` keeps lints scoped to larql-lql itself; otherwise
        # pre-existing clippy debt in `larql-inference` (a transitive
        # dep) would surface here.
        run: cargo clippy -p larql-lql --all-targets --no-deps -- -D warnings

      - name: Tests
        run: cargo test -p larql-lql

      - name: Benchmark compile/tests
        run: cargo test -p larql-lql --benches
