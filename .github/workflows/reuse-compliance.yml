name: REUSE Compliance

on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:
    branches: [ main ]

jobs:
  reuse-compliance:
    runs-on: ubuntu-latest
    name: REUSE Compliance Check
    steps:
      - uses: actions/checkout@v4

      - name: Check REUSE compliance
        uses: fsfe/reuse-action@v3
        with:
          args: lint
