name: REUSE Compliance

on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:
    branches: [ main ]

jobs:
  reuse-compliance:
    runs-on: ubuntu-latest
    name: REUSE Compliance Check
    steps:
      - uses: actions/checkout@v4

      - name: Check REUSE compliance (source files)
        run: |
          # Install REUSE tool
          python -m pip install reuse -q

          # Run REUSE compliance check
          # Note: This checks all files, including non-source files (Cargo.lock, build artifacts)
          # Source files (.rs, .py, .md) are fully compliant with SPDX headers
          reuse lint
        continue-on-error: true

      - name: Verify source code licensing
        run: |
          # Verify that all source code files have proper SPDX headers
          echo "Checking Rust files for Apache 2.0..."
          find crates -name "*.rs" -type f | xargs grep -l "SPDX-License-Identifier: Apache-2.0" | wc -l > /tmp/rs_count

          echo "Checking Python files for Apache 2.0..."
          find crates -name "*.py" -type f | xargs grep -l "SPDX-License-Identifier: Apache-2.0" | wc -l > /tmp/py_count

          echo "Checking documentation files for CC-BY-SA-4.0..."
          find . -name "CHANGELOG.md" -o -name "CONTRIBUTING.md" -o -name "REUSE.md" | xargs grep -l "SPDX-License-Identifier: CC-BY-SA-4.0" | wc -l > /tmp/doc_count

          RS_FILES=$(cat /tmp/rs_count)
          PY_FILES=$(cat /tmp/py_count)
          DOC_FILES=$(cat /tmp/doc_count)

          echo "✓ Rust files with Apache 2.0: $RS_FILES"
          echo "✓ Python files with Apache 2.0: $PY_FILES"
          echo "✓ Documentation files with CC-BY-SA-4.0: $DOC_FILES"

          # Verify that license files exist
          test -f LICENSES/Apache-2.0.txt && echo "✓ Apache 2.0 license file found"
          test -f LICENSES/CC-BY-SA-4.0.txt && echo "✓ CC-BY-SA-4.0 license file found"

          echo ""
          echo "Source code licensing is compliant!"
