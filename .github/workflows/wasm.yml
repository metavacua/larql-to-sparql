# wasm.yml — WASM CI: compile check + runtime test + native baseline
#
# Three job groups, sequenced and forensic:
#
#   wasm-check   — cargo check --target wasm32-unknown-unknown for every crate.
#                  Failures identify which native-only dependencies block WASM
#                  compilation. 15 crates × 2 modes = 30 cells.
#
#   wasm-test    — wasm-pack test with native test suites ported to
#                  #[wasm_bindgen_test]. Two CPU models × two runtimes:
#                    Serial CPU (single-threaded wasm32)
#                    Parallel CPU (multi-threaded via SharedArrayBuffer + Rayon)
#                  Many cells are expected to be red; that is the success
#                  criterion for this phase — failures are forensic data
#                  identifying porting work. 15 crates × 4 modes = 60 cells.
#
#   native-test  — cargo test on the native target. Runs after both WASM phases
#                  complete (pass or fail). Expected green; comparison with
#                  wasm-test reveals the porting backlog. 14 crates × 1 = 14
#                  cells (larql-js tested via wasm-test only).
#
# Triggers: push to main + all PRs that touch crate code or this file.

name: wasm

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/wasm.yml'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/wasm.yml'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

# ── WASM compile check ──────────────────────────────────────────────────────

jobs:
  wasm-check:
    name: check · ${{ matrix.crate.name }} · ${{ matrix.mode.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:

        crate:
          # Passing (or expected to pass with listed flags)
          - { name: larql-boundary,        cargo_flags: ''                                       }
          - { name: larql-core,            cargo_flags: '--no-default-features'                  }
          - { name: larql-models,          cargo_flags: '--no-default-features'                  }
          - { name: model-compute,         cargo_flags: '--no-default-features --features wasm'  }
          - { name: larql-compute,         cargo_flags: '--no-default-features'                  }
          - { name: larql-router-protocol, cargo_flags: ''                                       }
          - { name: larql-router,          cargo_flags: ''                                       }
          - { name: larql-server,          cargo_flags: '--no-default-features'                  }
          - { name: larql-vindex,          cargo_flags: '--no-default-features'                  }
          - { name: larql-inference,       cargo_flags: '--no-default-features'                  }
          - { name: larql-kv,              cargo_flags: '--no-default-features'                  }
          - { name: kv-cache-benchmark,    cargo_flags: '--no-default-features'                  }
          - { name: larql-lql,             cargo_flags: '--no-default-features'                  }
          - { name: larql-cli,             cargo_flags: '--no-default-features'                  }
          - { name: larql-js,              cargo_flags: ''                                       }

        mode:
          - { name: serial,   toolchain: stable,  rustflags: ''                                                          }
          - { name: parallel, toolchain: nightly, rustflags: '-C target-feature=+atomics,+bulk-memory,+mutable-globals'  }

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (${{ matrix.mode.toolchain }}) + wasm32 target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.mode.toolchain }}
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-wasm-check-${{ matrix.crate.name }}-${{ matrix.mode.name }}

      - name: Check (serial CPU)
        if: matrix.mode.name == 'serial'
        run: >-
          cargo check --target wasm32-unknown-unknown
          -p ${{ matrix.crate.name }}
          ${{ matrix.crate.cargo_flags }}

      - name: Check (parallel CPU)
        if: matrix.mode.name == 'parallel'
        env:
          RUSTFLAGS: ${{ matrix.mode.rustflags }}
        run: >-
          cargo check --target wasm32-unknown-unknown
          -p ${{ matrix.crate.name }}
          ${{ matrix.crate.cargo_flags }}

# ── WASM runtime test ────────────────────────────────────────────────────────

  wasm-test:
    name: test · ${{ matrix.crate.name }} · ${{ matrix.mode.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:

        # ── Testable crates ─────────────────────────────────────────────────
        # Each crate must have:
        #   crate-type = ["cdylib", "rlib"]  in Cargo.toml [lib]
        #   wasm-bindgen-test = "0.3"        in [dev-dependencies]
        #   at least one #[wasm_bindgen_test] in tests/wasm_compat.rs
        #
        # cargo_flags:       passed to wasm-pack test (mirrors wasm-check flags)
        # parallel_features: --features parallel appended only in parallel modes;
        #                    only larql-js exposes a `parallel` feature.
        crate:
          - { name: larql-js,              path: crates/larql-wasm,            cargo_flags: '',                                       parallel_features: '--features parallel' }
          - { name: larql-boundary,        path: crates/larql-boundary,        cargo_flags: '',                                       parallel_features: '' }
          - { name: larql-core,            path: crates/larql-core,            cargo_flags: '--no-default-features',                  parallel_features: '' }
          - { name: larql-models,          path: crates/larql-models,          cargo_flags: '--no-default-features',                  parallel_features: '' }
          - { name: model-compute,         path: crates/model-compute,         cargo_flags: '--no-default-features --features wasm',  parallel_features: '' }
          - { name: larql-compute,         path: crates/larql-compute,         cargo_flags: '--no-default-features',                  parallel_features: '' }
          - { name: larql-router-protocol, path: crates/larql-router-protocol, cargo_flags: '',                                       parallel_features: '' }
          - { name: larql-router,          path: crates/larql-router,          cargo_flags: '',                                       parallel_features: '' }
          - { name: larql-server,          path: crates/larql-server,          cargo_flags: '--no-default-features',                  parallel_features: '' }
          - { name: larql-vindex,          path: crates/larql-vindex,          cargo_flags: '--no-default-features',                  parallel_features: '' }
          - { name: larql-inference,       path: crates/larql-inference,       cargo_flags: '--no-default-features',                  parallel_features: '' }
          - { name: larql-kv,              path: crates/larql-kv,              cargo_flags: '--no-default-features',                  parallel_features: '' }
          - { name: kv-cache-benchmark,    path: crates/kv-cache-benchmark,    cargo_flags: '--no-default-features',                  parallel_features: '' }
          - { name: larql-lql,             path: crates/larql-lql,             cargo_flags: '--no-default-features',                  parallel_features: '' }
          - { name: larql-cli,             path: crates/larql-cli,             cargo_flags: '--no-default-features',                  parallel_features: '' }

        # ── Test modes: 2 CPU models × 2 runtimes ───────────────────────────
        #
        # Serial CPU   — single-threaded wasm32, no atomics/SharedArrayBuffer.
        # Parallel CPU — multi-threaded via SharedArrayBuffer + Rayon Workers.
        #
        # Node runtime   — SharedArrayBuffer available without COOP/COEP in Node 20+.
        # Firefox runtime — SharedArrayBuffer requires COOP/COEP headers from
        #                   wasm-pack's bundled test server (firefox-parallel).
        #                   Firefox 79+ supports WASM threads natively.
        mode:
          - name: node-serial
            runtime: node
            wasm_pack_flags: '--node'
            toolchain: stable
            rustflags: ''

          - name: node-parallel
            runtime: node
            wasm_pack_flags: '--node'
            toolchain: nightly
            rustflags: '-C target-feature=+atomics,+bulk-memory,+mutable-globals'

          - name: firefox-serial
            runtime: firefox
            wasm_pack_flags: '--firefox --headless'
            toolchain: stable
            rustflags: ''

          - name: firefox-parallel
            runtime: firefox
            wasm_pack_flags: '--firefox --headless'
            toolchain: nightly
            rustflags: '-C target-feature=+atomics,+bulk-memory,+mutable-globals'

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (${{ matrix.mode.toolchain }}) + wasm32 target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.mode.toolchain }}
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-wasm-test-${{ matrix.crate.name }}-${{ matrix.mode.name }}

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Set up Node.js 22
        if: matrix.mode.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Firefox
        if: matrix.mode.runtime == 'firefox'
        uses: browser-actions/setup-firefox@v1

      - name: Set up geckodriver
        if: matrix.mode.runtime == 'firefox'
        uses: browser-actions/setup-geckodriver@v0.0.0

      - name: Test (serial CPU)
        if: "!contains(matrix.mode.name, 'parallel')"
        env:
          RUSTFLAGS: ${{ matrix.mode.rustflags }}
        run: >-
          wasm-pack test
          ${{ matrix.mode.wasm_pack_flags }}
          ${{ matrix.crate.path }}
          ${{ matrix.crate.cargo_flags }}

      - name: Test (parallel CPU)
        if: contains(matrix.mode.name, 'parallel')
        env:
          RUSTFLAGS: ${{ matrix.mode.rustflags }}
        run: >-
          wasm-pack test
          ${{ matrix.mode.wasm_pack_flags }}
          ${{ matrix.crate.path }}
          ${{ matrix.crate.cargo_flags }}
          ${{ matrix.crate.parallel_features }}

# ── Native test baseline ──────────────────────────────────────────────────────

  native-test:
    name: test · ${{ matrix.crate }} · native
    needs: [wasm-check, wasm-test]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        # larql-js is the WASM API bundle; tested via wasm-test only.
        crate:
          - larql-boundary
          - larql-core
          - larql-models
          - model-compute
          - larql-compute
          - larql-router-protocol
          - larql-router
          - larql-server
          - larql-vindex
          - larql-inference
          - larql-kv
          - kv-cache-benchmark
          - larql-lql
          - larql-cli

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-native-${{ matrix.crate }}

      - name: Test
        run: cargo test -p ${{ matrix.crate }}
