# larql-models Windows CI
#
# Runs fmt + check + clippy + tests + bench test-mode on Windows for every
# change to the larql-models crate. Validates Windows-specific paths:
#   - HuggingFace cache path handling
#   - mmap semantics on Windows
#   - Path separators
# Linux/macOS runs are eliminated per project decision to consolidate on Windows.

name: larql-models

permissions:
  contents: read

on:
  push:
    branches: [main, windows-ci-cd]
    paths:
      - 'crates/larql-models/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/larql-models.yml'
  pull_request:
    branches: [main, windows-ci-cd]
    paths:
      - 'crates/larql-models/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/larql-models.yml'
  workflow_dispatch: {}

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  test:
    name: test · windows
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-models-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-models-

      - name: Format check
        run: cargo fmt -p larql-models -- --check

      - name: Check (all targets)
        run: cargo check -p larql-models --all-targets

      - name: Clippy (warnings as errors)
        run: cargo clippy -p larql-models --all-targets -- -D warnings

      - name: Test
        run: cargo test -p larql-models

      - name: Test benches
        run: cargo test -p larql-models --benches
