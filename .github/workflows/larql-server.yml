# larql-server Windows CI
#
# HTTP/gRPC inference server (vindex queries, OpenAI-compat, remote MoE
# expert shards). Build script bundles `protoc` via `protobuf_src`, so
# no system protoc install is required. Tests are split across many
# `test_http_*`, `test_grpc`, and `test_unit_*` files; all run without
# real model weights. Linux/macOS runs are eliminated per project
# decision to consolidate on Windows.

name: larql-server

permissions:
  contents: read

on:
  push:
    branches: [main, windows-ci-cd]
    paths:
      - 'crates/larql-server/**'
      - 'crates/larql-router-protocol/**'
      - 'crates/larql-vindex/**'
      - 'crates/larql-inference/src/**'
      - 'crates/larql-models/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - '.github/workflows/larql-server.yml'
  pull_request:
    branches: [main, windows-ci-cd]
    paths:
      - 'crates/larql-server/**'
      - 'crates/larql-router-protocol/**'
      - 'crates/larql-vindex/**'
      - 'crates/larql-inference/src/**'
      - 'crates/larql-models/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - '.github/workflows/larql-server.yml'
  workflow_dispatch: {}

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  test:
    name: test · windows
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cmake + zlib (Windows)
        shell: pwsh
        run: |
          choco install cmake zlib --installargs 'ADD_CMAKE_TO_PATH=System' -y
          refreshenv

      - name: Install OpenBLAS (Windows)
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) { $vcpkgRoot = "C:\vcpkg" }
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & "$vcpkgRoot\vcpkg.exe" install openblas:x64-windows
          "$vcpkgRoot\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-server-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-server-

      - name: Format check
        run: cargo fmt -p larql-server -- --check

      # `bench_expert_server` example currently doesn't build against
      # the post-refactor `larql-inference` API. Check the surface that
      # does compile (lib + bin + tests) until that example is fixed.
      - name: Check lib + bins + tests
        run: cargo check -p larql-server --lib --bins --tests

      - name: Clippy
        # `--no-deps` keeps lints scoped to larql-server itself;
        # otherwise pre-existing clippy debt in `larql-inference` (a
        # transitive dep) would surface here.
        run: cargo clippy -p larql-server --lib --bins --tests --no-deps -- -D warnings

      - name: Tests
        run: cargo test -p larql-server
