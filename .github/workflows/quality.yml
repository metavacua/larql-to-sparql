#
# Code scanning and code-quality workflow.
#
# Per docs/specs/compliance-pipeline.md (Out-of-scope), security scanning
# and vulnerability triage are intentionally NOT part of validate.yml. This
# file is the separate, parallel workflow that owns those concerns. It must
# never call into validate.yml, and validate.yml must never call into it.
#
# The two workflows are independent gates:
#
#   validate.yml  — deterministic candidate-validity (Axioms A1–A5)
#   quality.yml   — code scanning + code quality (this file)
#
# All checks here are pure functions of the tree at HEAD plus a fixed set of
# tool versions pinned in `env:` below. SARIF outputs are uploaded to GitHub
# Code Scanning under distinct categories so findings can be triaged in the
# Security tab.

name: quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly RustSec advisory refresh against the committed lockfile, so
    # newly-disclosed vulnerabilities surface even when no PR is open.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  # SARIF upload to the Code Scanning API requires `security-events: write`.
  security-events: write
  # `actions: read` lets the CodeQL action read workflow metadata.
  actions: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

# Pinned tool versions. Bumping any of these is a deliberate change to the
# scanning surface and should be done in a dedicated PR.
env:
  # 1.86.0 is the floor: the workspace's transitive dependency tree
  # (e.g. wat, pem-rfc7468, base64ct) pulls crates that require the
  # `edition2024` Cargo feature, stabilised in Rust 1.85. We use 1.86 to
  # give a small buffer above the absolute floor. validate.yml's pinned
  # toolchain is independent and can lag because that workflow does not
  # invoke cargo at all.
  # 1.88.0 is the floor: at this PR's resolution the tree pulls
  # `home v0.5.12`, `cookie_store v0.22.1`, and the `time-*` crates,
  # all of which declare `rust-version = 1.88`. Bumping further is
  # cheap; bumping below 1.88 fails resolution.
  RUST_TOOLCHAIN: "1.88.0"
  # Scanner tools (cargo-audit, cargo-deny) are intentionally NOT
  # version-pinned. They must keep pace with the evolving formats of
  # their backing advisory database: pinning to a specific patch made
  # the older cargo-audit reject CVSS-4.0 entries (e.g. RUSTSEC-2026-0073)
  # because its bundled cvss-parser predated CVSS 4.0. Tracking latest
  # is the correct policy for a tool whose value depends on currency
  # with an external feed.
  #
  # Reproducibility is preserved where it matters: the *Rust toolchain*
  # is pinned (RUST_TOOLCHAIN above), so the dep-tree resolution and
  # build behaviour are stable. Only the scanner-tool versions float.
  CLIPPY_SARIF_VERSION: "0.7.0"
  CARGO_TERM_COLOR: always
  # Note: do NOT set RUSTFLAGS=-D warnings at workflow scope. That would
  # promote rustc warnings (including those originating in transitive
  # dependencies) to hard errors and is more aggressive than the project's
  # local Makefile policy, which only uses clippy-level `-- -D warnings`.

jobs:
  # ---------------------------------------------------------------------
  # Note: cargo fmt --check is intentionally NOT a job here. The project
  # already enforces formatting locally via the Makefile (`make ci` and
  # `make fmt-check`) and via the `cargo-fmt` hook in
  # .pre-commit-config.yaml. Duplicating the check in CI surfaces a
  # toolchain-version-sensitive baseline gap (rustfmt output drifts
  # across rust releases) without adding meaningful security or
  # correctness signal. If a future policy decides to enforce fmt in CI,
  # it should follow a dedicated `style: cargo fmt --all` baseline-cleanup
  # PR so the gate flip is a no-op.

  # ---------------------------------------------------------------------
  # Q1: Clippy. Runs with -D warnings (gate) AND emits SARIF that is
  # uploaded to Code Scanning so individual findings are visible in the
  # Security tab even on green runs.
  # ---------------------------------------------------------------------
  clippy:
    name: clippy (-D warnings + SARIF)
    runs-on: ubuntu-24.04
    # The weekly cron is for refreshing advisory-feed scanners
    # (audit, deny). Lint/test/aggregate jobs add no signal on a
    # dormant tree and would just burn minutes; skip them on schedule.
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" \
            --component clippy \
            --profile minimal \
            --no-self-update
          rustup default "${RUST_TOOLCHAIN}"
          cargo clippy --version

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: quality-clippy

      - name: Install clippy-sarif and sarif-fmt
        uses: taiki-e/install-action@v2
        with:
          tool: clippy-sarif@${{ env.CLIPPY_SARIF_VERSION }},sarif-fmt@${{ env.CLIPPY_SARIF_VERSION }}

      - name: Run clippy and emit SARIF
        # `--message-format=json` is non-fatal so we can capture all
        # diagnostics into SARIF before the gating step decides verdict.
        run: |
          set -o pipefail
          cargo clippy \
            --workspace --tests --all-targets \
            --message-format=json \
            -- -D warnings \
            | clippy-sarif \
            | tee clippy.sarif \
            | sarif-fmt
        continue-on-error: true

      - name: Upload clippy SARIF to Code Scanning
        # SARIF upload is ancillary: it populates the Security tab. The
        # actual gate is the next step (`cargo clippy ... -D warnings`),
        # which must determine the job verdict regardless of whether the
        # Code Scanning API was reachable. Hence both `continue-on-error`
        # (don't fail the job on upload error) and `hashFiles(...)`
        # (don't even attempt upload if no SARIF was produced).
        if: always() && hashFiles('clippy.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: clippy.sarif
          category: clippy

      - name: Gate on clippy warnings
        # `if: always()` so the gate runs even if the SARIF upload step
        # errored (or was skipped because no SARIF was produced).
        if: always()
        id: clippy_gate
        # Re-runs clippy with a strict gate. Cheap relative to the build
        # in the previous step (cache is warm).
        run: |
          set -o pipefail
          cargo clippy --workspace --tests --all-targets -- -D warnings 2>&1 | tee /tmp/clippy.log
          echo "status=$?" >> $GITHUB_OUTPUT

      - name: Capture clippy diagnostics on failure
        if: failure() && steps.clippy_gate.outcome == 'failure'
        run: |
          echo "=== CLIPPY FAILURE DIAGNOSTICS ===" >&2
          echo "Full clippy output:" >&2
          cat /tmp/clippy.log >&2
          exit 1

  # ---------------------------------------------------------------------
  # Q3: Tests. The full workspace test surface. Feature-gated backends
  # (e.g. metal) are intentionally not enabled here — they require host
  # hardware that ubuntu-24.04 does not provide.
  # ---------------------------------------------------------------------
  test:
    name: test (cargo test --workspace)
    runs-on: ubuntu-24.04
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" \
            --profile minimal \
            --no-self-update
          rustup default "${RUST_TOOLCHAIN}"
          cargo --version

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: quality-test

      - name: cargo test --workspace
        id: test
        run: |
          set -o pipefail
          cargo test --workspace --no-fail-fast 2>&1 | tee /tmp/test.log
          echo "status=$?" >> $GITHUB_OUTPUT

      - name: Capture test diagnostics on failure
        if: failure() && steps.test.outcome == 'failure'
        run: |
          echo "=== TEST FAILURE DIAGNOSTICS ===" >&2
          echo "Last 150 lines of test output:" >&2
          tail -150 /tmp/test.log >&2
          exit 1

  # ---------------------------------------------------------------------
  # Q4: cargo-audit — RustSec advisory database scan against Cargo.lock.
  # Runs on every PR and on a weekly cron so that newly-disclosed advisories
  # surface even when the tree is dormant.
  #
  # The repository's .gitignore excludes Cargo.lock (workspace policy), so a
  # lockfile is generated deterministically at job start before scanning.
  # This means each run resolves against the index at run time rather than a
  # frozen snapshot — acceptable for advisory tracking, since the scan target
  # is "what would be installed today" rather than a historical commit.
  # ---------------------------------------------------------------------
  audit:
    name: audit (cargo-audit / RustSec)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" \
            --profile minimal \
            --no-self-update
          rustup default "${RUST_TOOLCHAIN}"

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Install cargo-audit (tracking latest)
        # See env: at the top of the file for the rationale on why this
        # tool is not version-pinned.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        id: audit
        # `--deny warnings` promotes unmaintained/yanked crates and other
        # advisory-but-not-vulnerability findings to failures.
        run: |
          set -o pipefail
          cargo audit --deny warnings 2>&1 | tee /tmp/audit.log
          echo "status=$?" >> $GITHUB_OUTPUT

      - name: Capture audit diagnostics on failure
        if: failure() && steps.audit.outcome == 'failure'
        run: |
          echo "=== CARGO AUDIT FAILURE DIAGNOSTICS ===" >&2
          echo "Full audit output:" >&2
          cat /tmp/audit.log >&2
          exit 1

  # ---------------------------------------------------------------------
  # Q5: cargo-deny — license allow-list, banned crates, advisories,
  # source allow-list. Configured by deny.toml at the repo root. The
  # license allow-list mirrors the audited multi-license policy enforced by
  # scripts/check_first_party_licenses.sh for *first-party* sources, applied
  # here to the *transitive dependency closure*.
  # ---------------------------------------------------------------------
  deny:
    name: deny (cargo-deny / licenses + bans + sources)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" \
            --profile minimal \
            --no-self-update
          rustup default "${RUST_TOOLCHAIN}"

      - name: Generate Cargo.lock
        # See the audit job for the rationale; the workspace gitignores
        # Cargo.lock so we materialise it at job start.
        run: cargo generate-lockfile

      - name: Install cargo-deny (tracking latest)
        # See env: at the top of the file for the rationale on why this
        # tool is not version-pinned.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo deny check
        id: deny
        # The flag set must mirror deny.toml :: graph (all-features = false,
        # no-default-features = false). Passing --all-features here would
        # evaluate a different dependency graph than the configuration
        # declares, defeating the purpose of pinning the graph in config.
        run: |
          set -o pipefail
          cargo deny check advisories bans licenses sources 2>&1 | tee /tmp/deny.log
          echo "status=$?" >> $GITHUB_OUTPUT

      - name: Capture deny diagnostics on failure
        if: failure() && steps.deny.outcome == 'failure'
        run: |
          echo "=== CARGO DENY FAILURE DIAGNOSTICS ===" >&2
          echo "Full deny output:" >&2
          cat /tmp/deny.log >&2
          exit 1

  # ---------------------------------------------------------------------
  # CodeQL is intentionally NOT defined here. The repository uses GitHub's
  # default-setup CodeQL (configured in repository settings) which already
  # analyses python, rust, actions, and c-cpp. Adding a parallel CodeQL
  # workflow would emit duplicate SARIF for the same `/language:*`
  # categories and conflict with the default-setup uploads. To change the
  # CodeQL surface (queries, languages), edit it in the repository's Code
  # Scanning settings rather than here.

  # ---------------------------------------------------------------------
  # Q6: cargo doc with -D warnings. Catches broken intra-doc links,
  # missing-docs lints (where enabled), and other rustdoc diagnostics
  # that would otherwise rot silently. The workspace has extensive cross-
  # crate references (LQL parser <-> executor symmetry, vindex format
  # docs); a broken link is a real regression.
  # ---------------------------------------------------------------------
  doc:
    name: doc (cargo doc -D warnings)
    runs-on: ubuntu-24.04
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" \
            --profile minimal \
            --no-self-update
          rustup default "${RUST_TOOLCHAIN}"

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: quality-doc

      - name: cargo doc
        # `--no-deps` to avoid promoting third-party rustdoc warnings to
        # errors. `--workspace` to traverse every library crate.
        # `larql-python` is excluded because rustdoc on a PyO3 cdylib
        # requires Python build deps that aren't in scope here; the
        # Python crate is documented from its pyproject side.
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: |
          cargo doc \
            --workspace \
            --no-deps \
            --exclude larql-python

  # ---------------------------------------------------------------------
  # Q7: Examples build verification. The Makefile lists ~6 example
  # binaries (architecture_demo, graph_demo, edge_demo, etc.) used as
  # smoke demos. Without a CI build they rot the moment a public API
  # they depend on changes. This job builds (does not run) all examples
  # in the workspace.
  # ---------------------------------------------------------------------
  examples:
    name: examples (cargo build --examples)
    runs-on: ubuntu-24.04
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" \
            --profile minimal \
            --no-self-update
          rustup default "${RUST_TOOLCHAIN}"

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: quality-examples

      - name: cargo build --workspace --examples
        run: cargo build --workspace --examples --exclude larql-python

  # ---------------------------------------------------------------------
  # Q8: MSRV verification. Cargo.toml declares
  # `rust-version = "1.80"` at the workspace level. Without verification,
  # this declaration drifts: a transitive dependency bump can silently
  # raise the effective minimum to a higher version (the comment in
  # env: above already notes 1.85+ is required by parts of the tree).
  #
  # cargo-msrv `verify` reads the declared rust-version and attempts a
  # check at exactly that toolchain. Failure means the declared MSRV is
  # a lie and either (a) the declaration must be raised, or (b) the
  # offending dependency must be pinned to an older version.
  #
  # Marked `continue-on-error: true` for the initial rollout: at this
  # writing the declared `1.80` is known to be inaccurate, so flipping
  # this to a hard gate must happen in a dedicated PR that *also* fixes
  # the declaration. The job still produces a visible signal (yellow
  # check) until that fix lands.
  # ---------------------------------------------------------------------
  msrv:
    name: msrv (cargo-msrv verify, informational)
    runs-on: ubuntu-24.04
    if: github.event_name != 'schedule'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Install rustup (no toolchain pin)
        # cargo-msrv installs and switches toolchains itself; we only
        # need rustup on PATH.
        run: |
          rustup show

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: quality-msrv

      - name: Install cargo-msrv
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-msrv

      - name: cargo msrv verify
        # `cargo msrv verify` operates on a single Cargo manifest and does
        # not accept `--workspace`; passing it caused an ArgsError. The
        # workspace-level `rust-version` is declared in the root manifest
        # under `[workspace.package]`, so verifying the root manifest is
        # the canonical workspace check. Per-member overrides (none today)
        # would need a per-crate iteration.
        run: |
          cargo msrv verify --manifest-path Cargo.toml

  # ---------------------------------------------------------------------
  # Q9: Mutation testing. cargo-mutants flips small predicates (boolean
  # negations, integer constants, return values) in source code and
  # checks whether the test suite catches each mutation. A mutant that
  # survives is evidence of an untested branch.
  #
  # Two modes:
  #   - On PRs: `--in-diff` restricts to the patch range, fast enough
  #     to run inline. Surviving mutants surface as informational; the
  #     job is `continue-on-error: true` because mutation testing is
  #     famously noisy on first introduction and must not block.
  #   - On weekly cron: full-tree run, results uploaded as artifact.
  # ---------------------------------------------------------------------
  mutants:
    name: mutants (cargo-mutants, informational)
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" \
            --profile minimal \
            --no-self-update
          rustup default "${RUST_TOOLCHAIN}"

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: quality-mutants

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: cargo mutants (PR diff scope)
        if: github.event_name == 'pull_request'
        # `--in-diff` restricts to the patch range; budget kept tight so
        # PRs don't stall on long mutation runs.
        run: |
          cargo mutants \
            --in-diff <(git diff "${{ github.event.pull_request.base.sha }}"..HEAD) \
            --no-shuffle \
            --timeout 120 \
            --workspace \
            --exclude larql-python \
            --exclude kv-cache-benchmark \
            || true

      - name: cargo mutants (full tree, cron only)
        if: github.event_name == 'schedule'
        run: |
          cargo mutants \
            --no-shuffle \
            --timeout 120 \
            --workspace \
            --exclude larql-python \
            --exclude kv-cache-benchmark \
            || true

      - name: Upload mutants report
        if: always() && hashFiles('mutants.out/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: mutants-${{ github.run_id }}
          path: mutants.out/
          retention-days: 14

  # ---------------------------------------------------------------------
  # Q10: Python (PyO3) bindings test surface. The `larql-python` crate
  # builds a cdylib via maturin under uv, with a tests/ directory that
  # is currently never executed in CI. The Makefile already encodes the
  # canonical local invocation; this job mirrors it.
  # ---------------------------------------------------------------------
  python:
    name: python (maturin develop + pytest)
    runs-on: ubuntu-24.04
    if: github.event_name != 'schedule'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            python3-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" \
            --profile minimal \
            --no-self-update
          rustup default "${RUST_TOOLCHAIN}"

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: quality-python

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: uv sync (dev)
        working-directory: crates/larql-python
        run: uv sync --no-install-project --group dev

      - name: maturin develop --release
        working-directory: crates/larql-python
        run: uv run --no-sync maturin develop --release

      - name: pytest
        working-directory: crates/larql-python
        run: uv run --no-sync pytest tests/ -v

  # ---------------------------------------------------------------------
  # Q11: Protocol schema lint. The repo carries gRPC schemas under
  # crates/larql-server/proto/ and crates/larql-router-protocol/proto/.
  # `buf lint` enforces consistent style and catches schema-level
  # mistakes (e.g. unused imports, missing field numbers); `buf
  # breaking` (when wired up) detects wire-incompatible changes. For
  # now this job runs lint only; breaking-change detection requires a
  # buf.yaml + a baseline ref and is left for a follow-up.
  # ---------------------------------------------------------------------
  proto-lint:
    name: proto-lint (buf lint)
    runs-on: ubuntu-24.04
    if: github.event_name != 'schedule'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1

      - name: buf lint (server proto)
        working-directory: crates/larql-server/proto
        run: buf lint || true

      - name: buf lint (router proto)
        working-directory: crates/larql-router-protocol/proto
        run: buf lint || true

  # ---------------------------------------------------------------------
  # Aggregate gate. Mirrors validate.yml's `candidate-validity` shape so
  # branch protection (if adopted for this workflow) can require a single
  # check. Independent of validate.yml — neither calls the other.
  #
  # Informational jobs (msrv, mutants, python, proto-lint) carry
  # `continue-on-error: true` so their internal failures do not propagate
  # here. They surface as yellow signals on the run page.
  # ---------------------------------------------------------------------
  quality-gate:
    name: quality gate
    runs-on: ubuntu-24.04
    needs: [clippy, test, audit, deny, doc, examples, msrv, mutants, python, proto-lint]
    # Skipped on cron because most jobs are also skipped on cron;
    # there is nothing to aggregate.
    if: github.event_name != 'schedule'
    steps:
      - name: All quality checks passed
        run: |
          echo "clippy, test, audit, deny, doc, examples all green."
          echo "msrv, mutants, python, proto-lint are informational."
          echo "CodeQL is owned by the repository's default-setup configuration;"
          echo "see docs/specs/code-quality-pipeline.md for the boundary."
          echo "This workflow is independent of validate.yml. Per the"
          echo "compliance pipeline spec, code scanning is out-of-scope"
          echo "for the candidate-validity gate; this workflow is the"
          echo "separate carrier required by that policy."
