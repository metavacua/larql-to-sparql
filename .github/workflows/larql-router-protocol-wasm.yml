# larql-router-protocol WASM CI
#
# larql-router-protocol has zero unit tests — it is a prost-generated gRPC
# protocol types crate. tonic/tokio are already gated to
# cfg(not(target_arch = "wasm32")) in its Cargo.toml. This workflow verifies
# that the generated types compile and pass clippy on wasm32-unknown-unknown.
# fail-fast is false intentionally: all failures must be visible.

name: larql-router-protocol-wasm

on:
  push:
    branches: [main]
    paths:
      - 'crates/larql-router-protocol/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/larql-router-protocol-wasm.yml'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - 'crates/larql-router-protocol/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/larql-router-protocol-wasm.yml'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  check:
    name: wasm · ${{ matrix.mode.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        mode:
          - name: serial
            toolchain: stable
            rustflags: ''
          - name: parallel
            toolchain: nightly
            rustflags: '-C target-feature=+atomics,+bulk-memory,+mutable-globals'

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (${{ matrix.mode.toolchain }}) + wasm32 target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.mode.toolchain }}
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm32-cargo-router-protocol-${{ matrix.mode.name }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wasm32-cargo-router-protocol-${{ matrix.mode.name }}-

      - name: Format check
        run: cargo fmt -p larql-router-protocol -- --check

      - name: Check
        env:
          RUSTFLAGS: ${{ matrix.mode.rustflags }}
        run: cargo check -p larql-router-protocol --target wasm32-unknown-unknown

      - name: Clippy
        env:
          RUSTFLAGS: ${{ matrix.mode.rustflags }}
        run: cargo clippy -p larql-router-protocol --target wasm32-unknown-unknown -- -D warnings
