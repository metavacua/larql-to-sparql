name: publish-ci-image

# Manually-triggered publication of the Linux CI base image used by
# .github/workflows/ci.yml. Runs only on workflow_dispatch so PRs from
# forks never push images to ghcr.io (they cannot, lacking
# packages:write, but explicit absence of pull_request triggers makes
# the security boundary obvious to readers).
#
# Bootstrap procedure (one-time, then for each Dockerfile change):
#   1. Trigger this workflow from the branch that contains the desired
#      Dockerfile (Actions tab -> publish-ci-image -> Run workflow).
#   2. Read the "image-digest" output printed by the publish step.
#   3. Update env.LINUX_CI_IMAGE in .github/workflows/ci.yml to the new
#      ghcr.io/metavacua/larql-ci-linux@sha256:<digest> value.
#   4. Commit + push that ci.yml change.
#
# The image is referenced by digest in ci.yml (not by tag) so that retags
# on ghcr.io cannot silently change CI inputs.

on:
  workflow_dispatch:
    inputs:
      tag-suffix:
        description: "Suffix appended to the image tag (default: branch sha)."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ci-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: build-and-publish (linux-ci)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Compute image tag
        id: tag
        run: |
          short_sha="$(git rev-parse --short HEAD)"
          suffix="${{ inputs.tag-suffix }}"
          if [ -n "${suffix}" ]; then
            tag="1.88.0-${short_sha}-${suffix}"
          else
            tag="1.88.0-${short_sha}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository_owner }}/larql-ci-linux" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .github/docker/linux-ci
          file: .github/docker/linux-ci/Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}
            ${{ steps.tag.outputs.image }}:1.88.0-latest

      - name: Print image digest for ci.yml pinning
        run: |
          echo "::notice title=Image published::"
          echo "Tag(s):"
          echo "  ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}"
          echo "  ${{ steps.tag.outputs.image }}:1.88.0-latest"
          echo "Digest (pin this in env.LINUX_CI_IMAGE):"
          echo "  ${{ steps.tag.outputs.image }}@${{ steps.push.outputs.digest }}"
