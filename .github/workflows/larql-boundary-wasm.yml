# larql-boundary WASM CI
#
# Mirrors larql-boundary.yml for wasm32-unknown-unknown. Uses wasm-pack test
# --node and --firefox --headless as execution environments.
# fail-fast is false intentionally: all failures must be visible.

name: larql-boundary-wasm

on:
  push:
    branches: [main]
    paths:
      - 'crates/larql-boundary/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/larql-boundary-wasm.yml'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - 'crates/larql-boundary/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/larql-boundary-wasm.yml'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  test:
    name: wasm · ${{ matrix.mode.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        mode:
          - name: serial
            toolchain: stable
            rustflags: ''
          - name: parallel
            toolchain: nightly
            rustflags: '-C target-feature=+atomics,+bulk-memory,+mutable-globals'

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (${{ matrix.mode.toolchain }}) + wasm32 target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.mode.toolchain }}
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Install Firefox
        uses: browser-actions/setup-firefox@v1

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm32-cargo-boundary-${{ matrix.mode.name }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wasm32-cargo-boundary-${{ matrix.mode.name }}-

      - name: Format check
        run: cargo fmt -p larql-boundary -- --check

      - name: Check
        env:
          RUSTFLAGS: ${{ matrix.mode.rustflags }}
        run: cargo check -p larql-boundary --target wasm32-unknown-unknown

      - name: Clippy
        env:
          RUSTFLAGS: ${{ matrix.mode.rustflags }}
        run: cargo clippy -p larql-boundary --target wasm32-unknown-unknown -- -D warnings

      - name: wasm-pack test · node
        env:
          RUSTFLAGS: ${{ matrix.mode.rustflags }}
        run: wasm-pack test --node crates/larql-boundary

      - name: wasm-pack test · firefox
        env:
          RUSTFLAGS: ${{ matrix.mode.rustflags }}
        run: wasm-pack test --firefox --headless crates/larql-boundary --features browser-tests

      - name: Check examples (compile only)
        env:
          RUSTFLAGS: ${{ matrix.mode.rustflags }}
        run: cargo check -p larql-boundary --target wasm32-unknown-unknown --examples
