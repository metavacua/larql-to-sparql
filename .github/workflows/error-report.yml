#
# Error reporting and aggregation workflow.
#
# When quality.yml or validate.yml fail, this workflow:
# 1. Fetches logs from the failed workflow run
# 2. Extracts tool-specific errors (Clippy, Cargo test, REUSE lint, etc.)
# 3. Sanitizes outputs to remove security-sensitive information
# 4. Posts organized PR comments per failed tool/checker
#
# This consolidates error reporting so contributors can see diagnostic
# details directly in the PR without navigating to the Actions UI.

name: error-report

on:
  workflow_run:
    workflows: [quality, validate]
    types: [completed]

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  # Collect and post error summaries for any failed jobs
  report-errors:
    name: Report errors from failed workflow
    runs-on: ubuntu-24.04
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download workflow logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch all jobs in the failed workflow run
          mkdir -p workflow-logs

          jobs_json=$(gh api repos/${REPO}/actions/runs/${RUN_ID}/jobs --paginate --jq '.jobs[] | select(.conclusion == "failure") | {id: .id, name: .name}' | jq -s '.')

          if [ "$jobs_json" == "[]" ] || [ -z "$jobs_json" ]; then
            echo "No failed jobs found."
            exit 0
          fi

          # For each failed job, download its logs and save with job name
          echo "$jobs_json" | jq -r '.[] | "\(.id),\(.name)"' | while IFS=',' read -r job_id job_name; do
            echo "Downloading logs for job ${job_id} (${job_name})..."
            # Sanitize job name for filename
            safe_name=$(echo "$job_name" | tr ' /' '_' | tr -dc '[:alnum:]_')
            gh api repos/${REPO}/actions/jobs/${job_id}/logs > "workflow-logs/${safe_name}.log" 2>&1 || true
          done

          echo "Downloaded logs:"
          ls -la workflow-logs/ || echo "No logs found"

      - name: Extract and post errors per tool
        uses: actions/github-script@v7
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Skip if this is not a PR
            if (!context.payload.workflow_run.pull_requests ||
                context.payload.workflow_run.pull_requests.length === 0) {
              console.log('Skipping: workflow_run is not associated with a PR');
              return;
            }

            const pr_number = context.payload.workflow_run.pull_requests[0].number;
            const workflow_name = process.env.WORKFLOW_NAME;
            const run_url = process.env.RUN_URL;

            // Parse logs to extract errors by tool
            const logsDir = 'workflow-logs';
            const toolErrors = {};

            if (!fs.existsSync(logsDir)) {
              console.log('No logs directory found');
              return;
            }

            // Helper: sanitize sensitive information
            function sanitizeLogs(logs) {
              let sanitized = logs;

              // GitHub tokens (ghp_, ghu_, ghs_, ghat_)
              sanitized = sanitized.replace(/g[hp][hs]t?_[A-Za-z0-9_]{36,255}/g, '***REDACTED_TOKEN***');

              // AWS keys
              sanitized = sanitized.replace(/AKIA[0-9A-Z]{16}/g, '***REDACTED_AWS_KEY***');

              // API keys in common formats
              sanitized = sanitized.replace(/api[_-]?key\s*[=:]\s*[^\s,;]+/gi, 'api_key=***REDACTED***');
              sanitized = sanitized.replace(/secret\s*[=:]\s*[^\s,;]+/gi, 'secret=***REDACTED***');

              return sanitized;
            }

            // Helper: extract error sections from logs
            function extractErrorSections(logContent) {
              const lines = logContent.split('\n');
              const errorSections = [];
              let currentSection = [];
              let isErrorContext = false;

              for (let i = 0; i < lines.length; i++) {
                const line = lines[i];

                // Detect error lines (::error format and common patterns)
                if (line.includes('::error') ||
                    line.match(/^error(\[|:|\s)/i) ||
                    line.includes('failed') && line.includes('error') ||
                    (isErrorContext && currentSection.length < 30)) {

                  if (!isErrorContext && currentSection.length > 0) {
                    // Save previous section
                    if (currentSection.length > 0) {
                      errorSections.push(currentSection.join('\n'));
                    }
                    currentSection = [];
                  }

                  isErrorContext = true;
                  currentSection.push(line);
                } else if (isErrorContext) {
                  // Continue context for a bit
                  if (currentSection.length < 30) {
                    currentSection.push(line);
                  } else {
                    // Section is long enough, save it
                    errorSections.push(currentSection.join('\n'));
                    currentSection = [];
                    isErrorContext = false;
                  }
                }
              }

              if (currentSection.length > 0) {
                errorSections.push(currentSection.join('\n'));
              }

              return errorSections.filter(s => s.trim().length > 0);
            }

            // Helper: identify tool from filename
            function identifyTool(fileName) {
              const lower = fileName.toLowerCase();

              if (lower.includes('clippy')) return 'clippy';
              if (lower.includes('test')) return 'test';
              if (lower.includes('audit')) return 'audit';
              if (lower.includes('deny')) return 'deny';
              if (lower.includes('provenance') || lower.includes('reuse')) return 'reuse';
              if (lower.includes('first')) return 'licenses';
              if (lower.includes('commit') || lower.includes('cocogitto')) return 'commits';
              if (lower.includes('changelog') || lower.includes('cliff')) return 'changelog';

              return null;
            }

            // Read all log files and extract errors
            try {
              const files = fs.readdirSync(logsDir).filter(f => f.endsWith('.log'));

              if (files.length === 0) {
                console.log('No log files found');
                return;
              }

              for (const file of files) {
                const filePath = path.join(logsDir, file);
                const logContent = fs.readFileSync(filePath, 'utf-8');
                const tool = identifyTool(file);

                if (!tool) {
                  console.log(`Skipping ${file}: could not identify tool`);
                  continue;
                }

                const errorSections = extractErrorSections(logContent);

                if (errorSections.length > 0) {
                  // Sanitize all error sections
                  const sanitized = errorSections.map(s => sanitizeLogs(s));

                  if (!toolErrors[tool]) {
                    toolErrors[tool] = [];
                  }
                  toolErrors[tool].push(...sanitized);
                }
              }
            } catch (err) {
              console.error('Error reading logs:', err);
              return;
            }

            // Post comments for each tool with errors
            const toolLabels = {
              'clippy': '🦀 Clippy (Rust Linting)',
              'test': '🧪 Test Suite',
              'audit': '🔐 RustSec Audit',
              'deny': '📋 cargo-deny',
              'reuse': '📝 REUSE License Headers',
              'licenses': '📄 First-Party Licenses',
              'commits': '💬 Conventional Commits',
              'changelog': '📖 CHANGELOG'
            };

            for (const [tool, errors] of Object.entries(toolErrors)) {
              if (errors.length === 0) continue;

              // Combine error sections with separator
              let errorText = errors.join('\n\n---\n\n');
              if (errorText.length > 60000) {
                errorText = errorText.substring(0, 60000) + '\n\n... (output truncated)';
              }

              const title = toolLabels[tool] || tool;

              const body = [
                `## ❌ ${title}`,
                '',
                '```',
                errorText,
                '```',
                '',
                `[View full logs →](${run_url})`,
              ].join('\n');

              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr_number,
                  body: body,
                });
                console.log(`Posted error comment for tool: ${tool}`);
              } catch (err) {
                console.error(`Failed to post comment for ${tool}:`, err);
              }
            }
