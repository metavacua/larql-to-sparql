#
# Error reporting and aggregation workflow (reusable).
#
# Called by quality.yml and validate.yml when jobs fail. Fetches logs from
# the current workflow run, extracts tool-specific errors, sanitizes
# security-sensitive data, and posts organized PR comments per failed
# tool/checker.
#
# This centralizes error reporting so contributors see diagnostic details
# directly in the PR without navigating to the Actions UI.

name: error-report

on:
  workflow_call:
    inputs:
      workflow_name:
        required: true
        type: string
        description: "Name of the workflow that failed (e.g., 'quality' or 'validate')"

permissions:
  pull-requests: write
  contents: read
  actions: read

jobs:
  report-failures:
    name: Post error comments to PR
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' || github.event.pull_request != null
    steps:
      - name: Fetch workflow logs and post errors
        uses: actions/github-script@v7
        env:
          WORKFLOW_NAME: ${{ inputs.workflow_name }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        with:
          script: |
            const workflow_name = process.env.WORKFLOW_NAME;
            const run_id = process.env.RUN_ID;
            const repo_parts = process.env.REPO.split('/');
            const owner = repo_parts[0];
            const repo = repo_parts[1];

            // Get PR number from context
            let pr_number = null;
            if (context.payload.pull_request) {
              pr_number = context.payload.pull_request.number;
            } else if (context.issue && context.issue.number) {
              pr_number = context.issue.number;
            }

            if (!pr_number) {
              console.log('Skipping: not associated with a pull request');
              return;
            }

            console.log(`Reporting errors for ${workflow_name} run ${run_id} on PR ${pr_number}`);

            // Fetch all jobs from the workflow run
            let jobs = [];
            try {
              const response = await github.rest.actions.listJobsForWorkflowRun({
                owner: owner,
                repo: repo,
                run_id: parseInt(run_id),
              });
              jobs = response.data.jobs || [];
            } catch (err) {
              console.error('Failed to fetch jobs:', err);
              return;
            }

            // Filter for failed jobs
            const failedJobs = jobs.filter(job => job.conclusion === 'failure');
            if (failedJobs.length === 0) {
              console.log('No failed jobs found');
              return;
            }

            // Helper: sanitize sensitive information
            function sanitizeOutput(output) {
              let sanitized = output;

              // GitHub tokens
              sanitized = sanitized.replace(/g[hp][hs]t?_[A-Za-z0-9_]{36,255}/g, '***REDACTED_TOKEN***');

              // AWS keys
              sanitized = sanitized.replace(/AKIA[0-9A-Z]{16}/g, '***REDACTED_AWS_KEY***');

              // API keys and secrets
              sanitized = sanitized.replace(/api[_-]?key\s*[=:]\s*[^\s,;]+/gi, 'api_key=***REDACTED***');
              sanitized = sanitized.replace(/secret\s*[=:]\s*[^\s,;]+/gi, 'secret=***REDACTED***');
              sanitized = sanitized.replace(/password\s*[=:]\s*[^\s,;]+/gi, 'password=***REDACTED***');
              sanitized = sanitized.replace(/token\s*[=:]\s*[^\s,;]+/gi, 'token=***REDACTED***');

              return sanitized;
            }

            // Helper: identify tool from job name
            function identifyTool(jobName) {
              const lower = jobName.toLowerCase();

              if (lower.includes('clippy')) return 'clippy';
              if (lower.includes('test')) return 'test';
              if (lower.includes('audit')) return 'audit';
              if (lower.includes('deny')) return 'deny';
              if (lower.includes('provenance') || lower.includes('reuse')) return 'reuse';
              if (lower.includes('first') || (lower.includes('license') && !lower.includes('test'))) return 'licenses';
              if (lower.includes('commit') || lower.includes('cocogitto')) return 'commits';
              if (lower.includes('changelog') || lower.includes('cliff')) return 'changelog';

              return null;
            }

            // Helper: extract error sections from log text
            function extractErrors(logText) {
              const lines = logText.split('\n');
              const errors = [];
              let currentError = [];

              for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const isErrorLine = line.match(/^error(\[|:|\s)/i) ||
                                   line.includes('error:') ||
                                   line.includes('::error');

                if (isErrorLine) {
                  if (currentError.length > 0) {
                    errors.push(currentError.join('\n'));
                    currentError = [];
                  }
                  currentError.push(line);
                } else if (currentError.length > 0) {
                  currentError.push(line);
                  // Limit error context size
                  if (currentError.length > 30) {
                    errors.push(currentError.join('\n'));
                    currentError = [];
                  }
                }
              }

              if (currentError.length > 0) {
                errors.push(currentError.join('\n'));
              }

              return errors.filter(e => e.trim().length > 0);
            }

            // Fetch logs and group errors by tool
            const toolErrors = {};
            const run_url = `${context.payload.repository.html_url}/actions/runs/${run_id}`;

            for (const job of failedJobs) {
              const tool = identifyTool(job.name);
              if (!tool) {
                console.log(`Skipping ${job.name}: could not identify tool`);
                continue;
              }

              // Fetch job logs
              let logContent = '';
              try {
                const response = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner: owner,
                  repo: repo,
                  job_id: job.id,
                });
                logContent = response.data;
              } catch (err) {
                console.log(`Could not fetch logs for job ${job.id}:`, err.message);
                continue;
              }

              // Extract errors
              const errors = extractErrors(logContent);
              if (errors.length === 0) {
                console.log(`No errors found in ${job.name}`);
                continue;
              }

              // Sanitize
              const sanitized = errors.map(e => sanitizeOutput(e));

              if (!toolErrors[tool]) {
                toolErrors[tool] = [];
              }
              toolErrors[tool].push(...sanitized);
            }

            // Tool display names
            const toolLabels = {
              'clippy': '🦀 Clippy (Rust Linting)',
              'test': '🧪 Test Suite',
              'audit': '🔐 RustSec Audit',
              'deny': '📋 cargo-deny',
              'reuse': '📝 REUSE License Headers',
              'licenses': '📄 First-Party Licenses',
              'commits': '💬 Conventional Commits',
              'changelog': '📖 CHANGELOG'
            };

            // Post comments for each tool
            for (const [tool, errors] of Object.entries(toolErrors)) {
              if (errors.length === 0) continue;

              // Combine errors
              let errorText = errors.slice(0, 3).join('\n\n---\n\n');

              // Truncate if needed
              if (errorText.length > 60000) {
                errorText = errorText.substring(0, 60000) + '\n\n... (output truncated)';
              }

              const title = toolLabels[tool] || tool;
              const body = [
                `## ❌ ${title}`,
                '',
                '```',
                errorText,
                '```',
                '',
                `[View full logs →](${run_url})`,
              ].join('\n');

              try {
                await github.rest.issues.createComment({
                  owner: owner,
                  repo: repo,
                  issue_number: pr_number,
                  body: body,
                });
                console.log(`Posted error comment for: ${tool}`);
              } catch (err) {
                console.error(`Failed to post comment for ${tool}:`, err);
              }
            }
