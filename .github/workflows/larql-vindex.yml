# larql-vindex Windows CI
#
# The crate checks here are model/model-architecture agnostic: no HuggingFace
# downloads, no real model weights, and no platform-specific GPU backends.
# Tests and examples use synthetic fixtures or compile-only checks.
# Linux/macOS runs are eliminated per project decision to consolidate on Windows.

name: larql-vindex

permissions:
  contents: read

on:
  push:
    branches: [main, windows-ci-cd]
    paths:
      - 'crates/larql-vindex/**'
      - 'crates/larql-lql/src/executor/lifecycle/compile/into_vindex.rs'
      - 'crates/larql-compute/src/cpu/ops/q4k_q8k_dot.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - '.github/workflows/larql-vindex.yml'
  pull_request:
    branches: [main, windows-ci-cd]
    paths:
      - 'crates/larql-vindex/**'
      - 'crates/larql-lql/src/executor/lifecycle/compile/into_vindex.rs'
      - 'crates/larql-compute/src/cpu/ops/q4k_q8k_dot.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - '.github/workflows/larql-vindex.yml'
  workflow_dispatch: {}

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  test:
    name: test · windows
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cmake + zlib (Windows)
        shell: pwsh
        run: |
          choco install cmake zlib --installargs 'ADD_CMAKE_TO_PATH=System' -y
          refreshenv

      - name: Install OpenBLAS (Windows)
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) { $vcpkgRoot = "C:\vcpkg" }
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & "$vcpkgRoot\vcpkg.exe" install openblas:x64-windows
          "$vcpkgRoot\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-vindex-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-vindex-

      - name: Format check
        run: cargo fmt -p larql-vindex -- --check

      - name: Check all targets
        run: cargo check -p larql-vindex --all-targets

      - name: Check examples
        run: cargo check -p larql-vindex --examples

      - name: Clippy
        run: cargo clippy -p larql-vindex --all-targets -- -D warnings

      - name: Tests
        run: cargo test -p larql-vindex

      - name: Benchmark compile/tests
        run: cargo test -p larql-vindex --benches
