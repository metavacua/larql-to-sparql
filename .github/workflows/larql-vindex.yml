# larql-vindex cross-platform CI
#
# The crate checks here are model/model-architecture agnostic: no HuggingFace
# downloads, no real model weights, and no platform-specific GPU backends.
# Tests and examples use synthetic fixtures or compile-only checks so the same
# surface runs on Linux, Windows, and macOS.

name: larql-vindex

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'crates/larql-vindex/**'
      - 'crates/larql-lql/src/executor/lifecycle/compile/into_vindex.rs'
      - 'crates/larql-compute/src/cpu/ops/q4k_q8k_dot.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - '.github/workflows/larql-vindex.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/larql-vindex/**'
      - 'crates/larql-lql/src/executor/lifecycle/compile/into_vindex.rs'
      - 'crates/larql-compute/src/cpu/ops/q4k_q8k_dot.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - '.github/workflows/larql-vindex.yml'
  workflow_dispatch: {}

env:
  LARQL_VINDEX_COVERAGE_MIN: 71

jobs:
  test:
    name: test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install OpenBLAS (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev pkg-config

      - name: Install OpenBLAS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) { $vcpkgRoot = "C:\vcpkg" }
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          & "$vcpkgRoot\vcpkg.exe" install openblas:x64-windows

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-vindex-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-vindex-

      - name: Install Windows Build Tools
        if: matrix.os == 'windows-latest'
        # protobuf-src's cmake build needs a C++ compiler and cmake.
        # Install VS Build Tools with VCTools workload and cmake/ninja.
        shell: pwsh
        run: |
          choco install -y visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools"
          choco install -y cmake ninja

      - name: Locate protoc from protobuf-src (Windows)
        if: matrix.os == 'windows-latest'
        # larql-vindex transitively depends on larql-server (via
        # larql-inference) which uses protobuf-src as a build-dependency.
        # Its build.rs uses cmake to build protoc and exposes the path via
        # protobuf_src::protoc(), which reads the INSTALL_DIR env var set
        # during the build. On Windows we need to build the dependency
        # first, then derive the PROTOC path from the install directory.
        id: protobuf-src
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Build protobuf-src so cmake runs and INSTALL_DIR is set.
          cargo build --package protobuf-src 2>&1 | Out-Null

          # Extract INSTALL_DIR from JSON build output.
          $json = cargo build --package protobuf-src --message-format=json 2>&1 | ConvertFrom-Json | Where-Object { $_.package_id -like "protobuf-src*" }
          $installDir = $json.env | Where-Object { $_.name -eq "INSTALL_DIR" } | Select-Object -ExpandProperty value

          if ($installDir) {
            $protocExe = Join-Path $installDir "bin\protoc.exe"
            if (Test-Path $protocExe) {
              Write-Output "PROTOC=$protocExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              Write-Output "Found protoc at: $protocExe"
            } else {
              Write-Output "::warning::protoc.exe not found at $protocExe, build may still succeed"
            }
          } else {
            Write-Output "::warning::INSTALL_DIR not found in protobuf-src build output, build may still succeed"
          }

      - name: Format check
        run: cargo fmt -p larql-vindex -- --check

      - name: Check all targets
        run: cargo check -p larql-vindex --all-targets

      - name: Check examples
        run: cargo check -p larql-vindex --examples

      - name: Clippy
        run: cargo clippy -p larql-vindex --all-targets -- -D warnings

      - name: Tests
        run: cargo test -p larql-vindex

      - name: Benchmark compile/tests
        run: cargo test -p larql-vindex --benches

  coverage:
    name: coverage - ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install OpenBLAS
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev pkg-config

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage summary
        run: cargo llvm-cov --package larql-vindex --summary-only --fail-under-lines "$LARQL_VINDEX_COVERAGE_MIN"

      - name: Coverage policy
        run: |
          mkdir -p coverage/larql-vindex
          cargo llvm-cov report --package larql-vindex --json --summary-only --output-path coverage/larql-vindex/summary.json
          python3 scripts/check_coverage_policy.py coverage/larql-vindex/summary.json crates/larql-vindex/coverage-policy.json
