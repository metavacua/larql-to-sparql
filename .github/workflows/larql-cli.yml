# larql-cli Windows CI
#
# Top-level `larql` binary. Default features enable Metal on every
# member crate, which only resolves on macOS. Windows runs use
# `--no-default-features` so the CPU-only surface is exercised.
# Linux/macOS runs are eliminated per project decision to consolidate
# on Windows.
#
# `convert_moe_to_per_layer` example currently doesn't build against
# the post-refactor `larql-inference` API; CI checks bins + tests
# instead of `--all-targets` until that example is repaired.

name: larql-cli

permissions:
  contents: read

on:
  push:
    branches: [main, windows-ci-cd]
    paths:
      - 'crates/larql-cli/**'
      - 'crates/larql-lql/**'
      - 'crates/larql-kv/**'
      - 'crates/larql-vindex/**'
      - 'crates/larql-models/**'
      - 'crates/larql-inference/src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - '.github/workflows/larql-cli.yml'
  pull_request:
    branches: [main, windows-ci-cd]
    paths:
      - 'crates/larql-cli/**'
      - 'crates/larql-lql/**'
      - 'crates/larql-kv/**'
      - 'crates/larql-vindex/**'
      - 'crates/larql-models/**'
      - 'crates/larql-inference/src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - '.github/workflows/larql-cli.yml'
  workflow_dispatch: {}

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  test:
    name: test · windows
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cmake + zlib (Windows)
        shell: pwsh
        run: |
          choco install cmake zlib --installargs 'ADD_CMAKE_TO_PATH=System' -y
          refreshenv

      - name: Install OpenBLAS (Windows)
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) { $vcpkgRoot = "C:\vcpkg" }
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & "$vcpkgRoot\vcpkg.exe" install openblas:x64-windows
          "$vcpkgRoot\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-cli-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-cli-

      - name: Format check
        run: cargo fmt -p larql-cli -- --check

      - name: Check (CPU only)
        run: cargo check -p larql-cli --bins --tests --no-default-features

      # Clippy is intentionally skipped: as of 2026-05-10 `larql-cli`
      # carries ~82 pre-existing errors under default features and ~112
      # under `--no-default-features` (mostly `large_enum_variant` and
      # `dead_code` on metal-only paths). Re-enable once that backlog
      # is cleared; the other crates' workflows already enforce
      # `clippy -- -D warnings`.

      - name: Tests (CPU only)
        run: cargo test -p larql-cli --no-default-features
