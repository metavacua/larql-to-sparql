# larql-boundary Windows CI
#
# Runs fmt + check + clippy + tests + bench test-mode on Windows.
# No model weights or MLX required — the crate is pure Rust.
# Linux/macOS runs are eliminated per project decision to consolidate
# on Windows.

name: larql-boundary

permissions:
  contents: read

on:
  push:
    branches: [main, windows-ci-cd]
    paths:
      - 'crates/larql-boundary/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/larql-boundary.yml'
  pull_request:
    branches: [main, windows-ci-cd]
    paths:
      - 'crates/larql-boundary/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/larql-boundary.yml'
  workflow_dispatch: {}

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  test:
    name: test · windows
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-boundary-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-boundary-

      - name: Format check
        run: cargo fmt -p larql-boundary -- --check

      - name: Check (all targets)
        run: cargo check -p larql-boundary --all-targets

      - name: Clippy (warnings as errors)
        run: cargo clippy -p larql-boundary --all-targets -- -D warnings

      - name: Unit + integration tests
        run: cargo test -p larql-boundary

      - name: Test benchmarks (compile + smoke)
        run: cargo test -p larql-boundary --benches

      - name: Run examples
        run: |
          cargo run -p larql-boundary --example encode_decode
          cargo run -p larql-boundary --example gate_decision
