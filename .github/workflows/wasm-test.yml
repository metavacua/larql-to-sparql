# wasm-test.yml — WASM runtime test matrix (node · firefox)
#
# Companion to wasm.yml (which runs cargo check across all crates).
# This workflow runs wasm-pack test for crates that have wasm-bindgen-test
# integration tests wired up.
#
# Strategy matrix: crates × mode (node-serial / node-parallel / firefox-serial).
# fail-fast: false — all cells run; failures are data, not blockers.
#
# Adding a crate here requires:
#   crate-type = ["cdylib", "rlib"]  in Cargo.toml [lib]
#   wasm-bindgen-test = "0.3"        in [dev-dependencies]
#   at least one #[wasm_bindgen_test] in tests/ or src/
#
# Triggers: push to main + all PRs that touch crate code or this file.

name: wasm-test

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/wasm-test.yml'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/wasm-test.yml'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  wasm-test:
    name: ${{ matrix.crate.name }} · ${{ matrix.mode.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:

        # ── Testable crates ───────────────────────────────────────────────
        # Must have crate-type = ["cdylib", "rlib"] and wasm-bindgen-test.
        crate:
          - { name: larql-wasm, path: crates/larql-wasm }

        # ── Test modes ────────────────────────────────────────────────────
        #
        # node-serial   — stable Rust, standard wasm32-unknown-unknown,
        #                 Node.js 22 runtime.
        # node-parallel — nightly + atomics + bulk-memory + mutable-globals,
        #                 `parallel` feature, Node.js 22.
        #                 SharedArrayBuffer is available without flags on Node 20+.
        #                 Rayon falls back to single-thread when no worker pool is
        #                 initialised; the tests verify compilation + call-ability.
        # firefox-serial — stable Rust, Firefox headless via geckodriver.
        #                  Tests marked run_in_node_experimental are skipped by the
        #                  browser harness; this cell validates browser-targeted tests
        #                  as they are added and catches any browser-incompatible code.
        mode:
          - name: node-serial
            runtime: node
            wasm_pack_flags: '--node'
            toolchain: stable
            features: ''
            rustflags: ''

          - name: node-parallel
            runtime: node
            wasm_pack_flags: '--node'
            toolchain: nightly
            features: '--features parallel'
            rustflags: '-C target-feature=+atomics,+bulk-memory,+mutable-globals'

          - name: firefox-serial
            runtime: firefox
            wasm_pack_flags: '--firefox --headless'
            toolchain: stable
            features: ''
            rustflags: ''

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (${{ matrix.mode.toolchain }}) + wasm32 target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.mode.toolchain }}
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-wasm-test-${{ matrix.crate.name }}-${{ matrix.mode.name }}

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Set up Node.js 22
        if: matrix.mode.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Firefox
        if: matrix.mode.runtime == 'firefox'
        uses: browser-actions/setup-firefox@v1

      - name: Set up geckodriver
        if: matrix.mode.runtime == 'firefox'
        uses: browser-actions/setup-geckodriver@v1

      - name: Test (${{ matrix.mode.name }})
        env:
          RUSTFLAGS: ${{ matrix.mode.rustflags }}
        run: >-
          wasm-pack test
          ${{ matrix.mode.wasm_pack_flags }}
          ${{ matrix.crate.path }}
          ${{ matrix.mode.features }}
