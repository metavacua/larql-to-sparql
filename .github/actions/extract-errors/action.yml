name: Extract Errors
description: Extract and truncate errors from tool output logs

inputs:
  log-file:
    description: Path to log file to extract errors from
    required: true
  tool-type:
    description: Type of tool (cargo, generic, script)
    required: false
    default: cargo
  error-limit:
    description: Maximum number of errors to extract
    required: false
    default: '20'

outputs:
  errors:
    description: Extracted errors as formatted text
    value: ${{ steps.extract.outputs.errors }}
  error-count:
    description: Total number of errors found
    value: ${{ steps.extract.outputs.error-count }}
  truncated:
    description: Whether output was truncated
    value: ${{ steps.extract.outputs.truncated }}

runs:
  using: composite
  steps:
    - name: Extract errors from log
      id: extract
      shell: bash
      env:
        LOG_FILE: ${{ inputs.log-file }}
        TOOL_TYPE: ${{ inputs.tool-type }}
        ERROR_LIMIT: ${{ inputs.error-limit }}
      run: |
        set +e  # Disable exit on error for this section

        # Check if log file exists and has content
        if [[ ! -f "$LOG_FILE" ]] || [[ ! -s "$LOG_FILE" ]]; then
          echo "errors=" >> "$GITHUB_OUTPUT"
          echo "error-count=0" >> "$GITHUB_OUTPUT"
          echo "truncated=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # For cargo tools, extract explicit error lines
        if [[ "$TOOL_TYPE" == "cargo" ]]; then
          errors=$(grep -E "^error(\[|:)" "$LOG_FILE" 2>/dev/null | head -n "$ERROR_LIMIT" || true)
          total_errors=$(grep -cE "^error(\[|:)" "$LOG_FILE" 2>/dev/null || echo 0)
        else
          # For generic/script tools, use a multi-stage approach
          # First try to extract lines with error keywords (limit to ERROR_LIMIT with -m flag)
          errors=$(grep -im "$ERROR_LIMIT" -E "(error|failed|failure|panic)" "$LOG_FILE" 2>/dev/null || true)

          # If no errors found with keywords, extract last N lines (often contains summary)
          if [[ -z "$errors" ]]; then
            errors=$(tail -n "$ERROR_LIMIT" "$LOG_FILE" 2>/dev/null || true)
          fi

          # Count error-like lines
          total_errors=$(grep -ic -E "(error|failed|failure)" "$LOG_FILE" 2>/dev/null || echo 0)

          # If still 0, use line count as approximation
          if [[ $total_errors -eq 0 ]]; then
            total_errors=$(wc -l < "$LOG_FILE" 2>/dev/null || echo 0)
          fi
        fi

        # Determine if truncated
        extracted_count=$(echo "$errors" | grep -c . 2>/dev/null || echo 0)
        if [[ $extracted_count -ge $ERROR_LIMIT && $total_errors -gt $ERROR_LIMIT ]]; then
          truncated="true"
        else
          truncated="false"
        fi

        # Use heredoc for multi-line output to avoid escaping issues
        DELIMITER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
        {
          echo "errors<<$DELIMITER"
          echo "$errors"
          echo "$DELIMITER"
          echo "error-count=$total_errors"
          echo "truncated=$truncated"
        } >> "$GITHUB_OUTPUT"

        set -e  # Re-enable exit on error
