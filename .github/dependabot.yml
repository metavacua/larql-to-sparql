#
# Dependabot configuration for automated dependency updates.
#
# Ecosystems tracked:
#
#   - cargo: Rust dependencies (both direct and indirect). Resolves workspace
#            manifest inheritance issues (e.g., when workspace.package.edition
#            is referenced in member crates). Tracks all dependency updates to
#            expose hidden version conflicts and platform-specific issues.
#
#   - pip / uv: Excluded. The Python bindings use `crates/larql-python/uv.lock`
#              managed by the maturin/uv toolchain. Dependabot's pip ecosystem
#              doesn't read uv.lock, and a scheduled `uv lock --check` CI job
#              provides the equivalent signal.
#
#   - github-actions: Action versions are tracked where well-supported and
#              necessary. The workflow files use floating tags (e.g.
#              `actions/checkout@v4`) softened by the compliance pipeline;
#              SHA pinning is the eventual goal via Dependabot automation.

version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Etc/UTC"
    allow:
      - dependency-type: "all"
    groups:
      cargo:
        patterns:
          - "*"
    commit-message:
      prefix: "build"
      include: "scope"
    labels:
      - "dependencies"
      - "cargo"
    open-pull-requests-limit: 20
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    # Group all action updates into a single PR per week. Reduces churn and
    # keeps the validate.yml + quality.yml updates atomic.
    groups:
      github-actions:
        patterns:
          - "*"
    # Conventional Commits prefix so cocogitto accepts the auto-generated
    # commit messages without amendment. `ci:` mirrors the manual scope
    # used elsewhere for workflow changes.
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5
