#
# Dependabot configuration. Scoped to all dependency ecosystems: Rust (cargo),
# Python (uv), and GitHub Actions.
#
# Critical Design: Both Cargo.lock and uv.lock are now committed to the
# repository. Dependabot's Linux infrastructure discovers macOS platform
# assumptions (e.g., undeclared native extension build deps, Xcode-only headers)
# that the original author's macOS IDE assumptions would hide. The S3 Ubuntu
# matrix then validates that the resolution is truly cross-platform.
#
# Supply-chain transactions (Dependabot PRs) must survive S0–S3 gating before
# merge. If a bump introduces a Linux-incompatible wheel or missing sys.platform
# guard, the Ubuntu build job fails early and cheap.

version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    groups:
      dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "cargo"
    open-pull-requests-limit: 5

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    groups:
      dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5

