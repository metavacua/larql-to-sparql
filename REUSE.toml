# ---------------------------------------------------------------------------
# feat/android-aarch64 — wasmi migration + arm32 portable-atomic fixes.
#
# Two categories:
#
#   modified — originally Chris Hay's code, changed by Ian Douglas Lawrence
#              Norman McLean (wasmi interpreter replaces wasmtime JIT;
#              portable_atomic::AtomicU64 replaces std::sync::atomic::AtomicU64
#              for arm32 / targets without native 64-bit atomics).
#
#   new       — wasi_shim.rs is authored entirely by Ian Douglas Lawrence
#              Norman McLean (WASI preview1 host shim for wasmi).
