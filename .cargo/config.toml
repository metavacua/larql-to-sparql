# Cargo configuration for cross-platform builds

[build]
# Use parallel jobs by default (0 is invalid; unset to auto-detect CPU count)

# Android cross-compilation configuration
[target.aarch64-linux-android]
linker = "aarch64-linux-android-clang"
ar = "aarch64-linux-android-ar"

[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi-clang"
ar = "armv7a-linux-androideabi-ar"
