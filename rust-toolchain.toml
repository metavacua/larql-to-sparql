#
# Pinned Rust toolchain version for the workspace.
#
# This version must remain synchronized with:
# - .github/workflows/cross-platform-build.yml :: env.RUST_TOOLCHAIN
# - .github/workflows/quality.yml :: env.RUST_TOOLCHAIN
# - .github/workflows/validate.yml :: env.RUST_TOOLCHAIN
#
# The floor is 1.91.0, determined by transitive dependencies:
# - wasmtime v42+ (required for security patches) needs 1.91.0
# - wasmtime v29 had critical vulnerabilities (RUSTSEC-2026-0095/0096: sandbox escapes)

[toolchain]
channel = "1.91.0"
components = ["clippy", "rustfmt"]
